<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Secure Click — Вход / Регистрация</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    min-height: 100%;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  }

  body {
    width: 100%;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px;
    font-family: Arial, sans-serif;
    color: white;
  }

  #authContainer, #userContainer {
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
  }

  h2 {
    text-align: center;
    margin-bottom: 5px;
    background: linear-gradient(135deg, #fff, #a5f3fc);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .sub {
    text-align: center;
    font-size: 11px;
    color: #94a3b8;
    margin-bottom: 24px;
  }

  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    cursor: pointer;
  }

  .tab.active {
    background: #3b82f6;
  }

  .form {
    display: none;
  }

  .form.active {
    display: block;
  }

  input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    background: rgba(255,255,255,0.1);
    border: 1px solid #3b82f6;
    border-radius: 8px;
    color: white;
    font-size: 14px;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #3b82f6;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 8px;
  }

  .guest-btn {
    background: rgba(255,255,255,0.2);
  }

  .error {
    background: rgba(255,0,0,0.2);
    padding: 8px;
    margin-bottom: 12px;
    border-radius: 6px;
    font-size: 12px;
    display: none;
  }

  .user-avatar {
    width: 64px;
    height: 64px;
    background: #3b82f6;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 12px;
  }

  .demo-note {
    font-size: 9px;
    color: #64748b;
    text-align: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #334155;
  }

  .plan-selector {
    display: flex;
    gap: 10px;
    margin: 15px 0;
  }

  .plan-option {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
  }

  .plan-free {
    background: #3b82f6;
  }

  .plan-pro {
    background: rgba(59,130,246,0.2);
  }
</style>
</head>
<body>

<h2>🛡️ Secure Click</h2>
<div class="sub">Защита от фишинга</div>

<div id="authContainer"></div>
<div id="userContainer" style="display: none;"></div>

<div class="demo-note">
  🔐 Безопасная авторизация на сервере<br>
  Нет тестовых данных — только реальная регистрация
</div>

<script src="auth-panel.js"></script>
</body>
</html>
