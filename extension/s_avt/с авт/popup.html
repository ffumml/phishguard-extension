<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Click</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 520px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
      padding: 16px;
      position: relative;
    }

    .profile-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      cursor: pointer;
      background: rgba(59, 130, 246, 0.2);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    .profile-btn:hover {
      background: rgba(59, 130, 246, 0.4);
      transform: scale(1.05);
    }

    .pro-badge {
      display: none;
      position: absolute;
      top: 52px;
      right: 20px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      font-size: 8px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
      border-radius: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      border: 1px solid rgba(59, 130, 246, 0.4);
    }

    .logo img {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      object-fit: cover;
    }

    h1 {
      background: linear-gradient(135deg, #fff, #a5f3fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 10px;
      background: rgba(59, 130, 246, 0.15);
      display: inline-block;
      padding: 2px 12px;
      border-radius: 20px;
    }

    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      flex: 1;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 10px 4px;
      text-align: center;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .stat-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      color: #94a3b8;
      margin-top: 5px;
    }

    .limit-card {
      background: rgba(15, 23, 42, 0.6);
      border-radius: 12px;
      padding: 8px 12px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }
    .limit-label {
      color: #94a3b8;
    }
    .limit-value {
      font-weight: 700;
      color: #3b82f6;
    }
    .upgrade-link {
      color: #f59e0b;
      cursor: pointer;
      text-decoration: underline;
      font-size: 10px;
    }

    .url-card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid rgba(59, 130, 246, 0.25);
    }

    .url-label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #3b82f6;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .url-text {
      color: #f1f5f9;
      font-size: 11px;
      word-break: break-all;
      font-family: monospace;
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 10px;
      border-radius: 12px;
      line-height: 1.4;
      max-height: 60px;
      overflow-y: auto;
      cursor: pointer;
    }

    .url-text:hover {
      background: rgba(0, 0, 0, 0.6);
    }

    .status-card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid rgba(59, 130, 246, 0.3);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .status-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
    }

    .status-card.safe::before { background: linear-gradient(90deg, #10b981, #34d399); }
    .status-card.phishing::before { background: linear-gradient(90deg, #ef4444, #f97316); }
    .status-card.error::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .status-card.loading::before { background: linear-gradient(90deg, #3b82f6, #8b5cf6); }

    .status-card.safe { border-color: rgba(16, 185, 129, 0.3); }
    .status-card.phishing { border-color: rgba(239, 68, 68, 0.3); }
    .status-card.error { border-color: rgba(245, 158, 11, 0.3); }

    .status-icon { font-size: 56px; margin-bottom: 12px; }
    .status-text { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .status-card.safe .status-text { color: #6ee7b7; }
    .status-card.phishing .status-text { color: #f87171; }
    .status-card.error .status-text { color: #fbbf24; }

    .status-score {
      font-size: 11px;
      background: rgba(0, 0, 0, 0.4);
      display: inline-block;
      padding: 3px 12px;
      border-radius: 30px;
      margin-bottom: 6px;
      color: #94a3b8;
    }

    .status-desc {
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.4;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(30, 41, 59, 0.95);
      color: #f1f5f9;
      border: 1px solid rgba(59, 130, 246, 0.5);
      transition: all 0.2s;
    }
    .btn:hover {
      transform: translateY(-1px);
      background: rgba(59, 130, 246, 0.25);
      border-color: #3b82f6;
    }
    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.5);
      color: #fca5a5;
    }
    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.3);
      border-color: #ef4444;
      color: white;
    }
    .btn-pro {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border-color: transparent;
      color: white;
    }
.btn-ai {
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    border-color: transparent;
    color: white;
}
.btn-ai:hover {
    transform: translateY(-1px);
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
}
    .pulsing-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
    }
    .pulsing-dots span {
      width: 12px;
      height: 12px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .pulsing-dots span:nth-child(1) { animation-delay: 0s; }
    .pulsing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .pulsing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { transform: scale(0.5); opacity: 0.3; }
      50% { transform: scale(1); opacity: 1; }
    }

    .safe-icon-wrapper {
      position: relative;
      width: 56px;
      height: 56px;
      margin: 0 auto;
    }
    .safe-circle {
      fill: none;
      stroke: #10b981;
      stroke-width: 2;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawCircle 0.6s ease forwards;
    }
    .safe-check-mark {
      fill: none;
      stroke: #10b981;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 30;
      stroke-dashoffset: 30;
      animation: drawCheck 0.5s ease 0.4s forwards;
    }
    .safe-pulse-ring {
      position: absolute;
      top: -4px;
      left: -4px;
      width: 64px;
      height: 64px;
      background: rgba(16, 185, 129, 0.2);
      border-radius: 50%;
      animation: pulseRing 1.5s ease-out infinite;
    }

    .danger-icon-wrapper {
      position: relative;
      width: 56px;
      height: 56px;
      margin: 0 auto;
    }
    .danger-exclamation {
      stroke: #ef4444;
      stroke-width: 2;
      stroke-linecap: round;
      animation: exclamationBlink 1s ease-in-out infinite;
    }
    .danger-pulse-ring {
      position: absolute;
      top: -4px;
      left: -4px;
      width: 64px;
      height: 64px;
      background: rgba(239, 68, 68, 0.3);
      border-radius: 50%;
      animation: dangerRingPulse 1s ease-out infinite;
    }

    .error-icon {
      animation: errorShake 0.5s ease-in-out;
    }
    .error-circle {
      fill: none;
      stroke: #f59e0b;
      stroke-width: 2;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawCircle 0.6s ease forwards;
    }
    .error-cross {
      stroke: #f59e0b;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 30;
      stroke-dashoffset: 30;
      animation: drawCross 0.5s ease 0.3s forwards;
    }

    @keyframes drawCircle { to { stroke-dashoffset: 0; } }
    @keyframes drawCheck { to { stroke-dashoffset: 0; } }
    @keyframes drawCross { to { stroke-dashoffset: 0; } }
    @keyframes pulseRing {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    @keyframes errorShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-2px); }
      80% { transform: translateX(2px); }
    }

    .debug-info {
      font-size: 9px;
      color: #64748b;
      text-align: center;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(59, 130, 246, 0.2);
      cursor: pointer;
    }
    .debug-info:hover { color: #94a3b8; }

    .copy-notification {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #10b981;
      color: white;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 11px;
      z-index: 1000;
      animation: fadeOut 2s ease forwards;
    }
    @keyframes fadeOut {
      0% { opacity: 1; transform: translateX(-50%) scale(1); }
      70% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) scale(0.9); visibility: hidden; }
    }
    .auth-required {
      text-align: center;
      padding: 20px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 16px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="profile-btn" id="profileBtn">
    <span>👤</span>
  </div>
  <div class="pro-badge" id="proBadge">⭐ PRO</div>

  <div class="header">
    <div class="logo">
      <img src="icons/icon.png" alt="Secure Click">
    </div>
    <h1>Secure Click</h1>
    <div class="subtitle">Защита от фишинговых сайтов</div>
  </div>

  <div class="limit-card">
    <span class="limit-label">📊 Осталось проверок сегодня:</span>
    <span class="limit-value" id="remainingChecks">--</span>
    <span class="upgrade-link" id="upgradeLimitLink" style="display: none;">🔒 Upgrade to Pro</span>
  </div>

    <div class="url-card">
    <div class="url-label">🔗 ТЕКУЩИЙ URL</div>
    <div class="url-text" id="currentUrl">Загрузка...</div>
  </div>

  <div id="authRequired" class="auth-required" style="display: none;">
    🔐 Требуется авторизация<br>
    <button class="btn" id="openAuthBtn" style="margin-top: 10px;">Войти или зарегистрироваться</button>
  </div>

  <div id="statusSection">
    <div class="status-card loading" id="statusCard">
      <div class="status-icon" id="statusIcon">
        <div class="pulsing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="status-text" id="statusText">Проверка...</div>
      <div class="status-score" id="statusScore"></div>
      <div class="status-desc" id="statusDesc">Отправка запроса на сервер</div>
    </div>
  </div>

<div class="button-group">
    <button class="btn" id="recheckBtn">🔄 Проверить</button>
    <button class="btn btn-ai" id="deepAnalyzeBtn" style="display: none;">🤖 AI-проверка</button>
    <button class="btn btn-pro" id="upgradeBtn" style="display: none;">💎 PRO</button>
</div>

  <div class="debug-info" id="debugInfo">📡 Статус: готов</div>

  <script src="popup.js"></script>
</body>
</html>
